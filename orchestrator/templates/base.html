<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>orchestrator</title>

  <!-- one variable font: heavy on headings, quiet on body -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&display=swap" rel="stylesheet">

  <!-- Tailwind via CDN (no build step). Tokens mirror static/style.css so
       /opacity modifiers work (bg-brand-400/10, ring-white/10 …). Preflight
       is off so style.css stays the source of truth for base elements. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      corePlugins: { preflight: false },
      theme: {
        extend: {
          colors: {
            ink: {
              950: '#1a1b1f', 900: '#0e1116', 850: '#222429', 800: '#2a2d33',
              700: '#1e232c', 600: '#2a303b', 500: '#3a4250', 400: '#566072',
              300: '#9296a0', 200: '#b7bac1', 100: '#edeef1',
            },
            brand: { 300: '#6fe3f7', 400: '#22d3ee', 500: '#0e9fc0', 600: '#0891b2' },
            ok: '#5ed39a', warn: '#f0c659', bad: '#f0676f', violet: '#c08af0',
          },
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
          },
          borderRadius: { '2xl': '1rem', xl: '0.75rem' },
          boxShadow: { card: '0 18px 40px -24px rgba(0,0,0,0.85), 0 2px 8px -4px rgba(0,0,0,0.5)' },
          keyframes: {
            fadeUp: { '0%': { opacity: '0', transform: 'translateY(18px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
          },
          animation: { fadeUp: 'fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both' },
        },
      },
    }
  </script>

  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <div class="bar">
      <h1>orchestrator</h1>
      <form method="post" action="/projects/add" class="add-project">
        <input type="text" name="path" placeholder="/path/to/project" required>
        <button type="submit" class="primary">+ add project</button>
      </form>
      <form method="post" action="/killall" class="killall"
            hx-post="/killall" hx-confirm="Kill ALL running dispatches?" hx-swap="none">
        <button type="submit" class="danger">stop all</button>
      </form>
    </div>
  </header>
  {% block body %}{% endblock %}

  <div id="global-spinner" aria-live="polite"><span class="spinner"></span>working…</div>

  <script>
  (function() {
    // Global spinner — show on any HTMX request *except* the 3s runs poll
    // (which would make the indicator strobe constantly).
    var banner = document.getElementById('global-spinner');
    var inflight = 0;
    function isPolling(evt) {
      var p = (evt && evt.detail && evt.detail.requestConfig &&
               evt.detail.requestConfig.path) || '';
      return p.indexOf('/partials/') === 0;
    }
    document.body.addEventListener('htmx:beforeRequest', function(evt) {
      if (isPolling(evt)) return;
      inflight++;
      banner.classList.add('visible');
    });
    function done(evt) {
      if (isPolling(evt)) return;
      inflight = Math.max(0, inflight - 1);
      if (inflight === 0) banner.classList.remove('visible');
    }
    document.body.addEventListener('htmx:afterRequest', done);
    document.body.addEventListener('htmx:responseError', done);
    document.body.addEventListener('htmx:sendError', done);

    // Generic helper exposed to inline form handlers in other templates.
    // Disables the button, swaps its text, and prepends a spinner. Caller
    // is responsible for the actual submit — we just decorate.
    window.orchMarkLoading = function(btn, busyLabel) {
      if (!btn || btn.dataset.loading === '1') return;
      btn.dataset.loading = '1';
      btn.dataset.originalHtml = btn.innerHTML;
      btn.disabled = true;
      btn.classList.add('is-loading');
      btn.innerHTML = '<span class="spinner"></span>' +
                      (busyLabel || 'working…');
    };
    window.orchClearLoading = function(btn) {
      if (!btn || btn.dataset.loading !== '1') return;
      btn.disabled = false;
      btn.classList.remove('is-loading');
      if (btn.dataset.originalHtml != null) {
        btn.innerHTML = btn.dataset.originalHtml;
      }
      delete btn.dataset.loading;
      delete btn.dataset.originalHtml;
    };
  })();
  </script>
</body>
</html>
