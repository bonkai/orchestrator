{% extends "base.html" %}
{% block body %}
<main class="playbook" style="max-width: 940px; margin: 1.5rem auto 4rem; padding: 0 1.25rem;">
  <p style="margin-bottom: 1rem;"><a href="/" class="preview-link">← back to dispatch</a></p>
  <article class="md">{{ content | safe }}</article>
</main>
<style>
  .md { color: #aeb6c4; line-height: 1.55; }
  .md h1 { margin: 0 0 0.4rem; font-size: 1.7rem; color: #e8ebf1; }
  .md h2 { margin: 1.6rem 0 0.6rem; padding-top: 1rem; border-top: 1px solid #1e232c; color: #e8ebf1; }
  .md h3 { margin: 1.2rem 0 0.5rem; color: #e8ebf1; font-size: 1.05rem; }
  .md p { margin: 0.55rem 0; }
  .md a { color: #22d3ee; }
  .md ul { margin: 0.5rem 0; padding-left: 1.25rem; }
  .md li { margin: 0.25rem 0; }
  .md code { background: #161a22; padding: 1px 5px; border-radius: 4px; font-size: 0.88em; color: #e8ebf1; }
  .md strong { color: #e8ebf1; }
  .md hr { border: 0; border-top: 1px solid #1e232c; margin: 1.4rem 0; }
  .md blockquote { border-left: 3px solid #3a4250; margin: 0.8rem 0; padding: 0.5rem 0.95rem;
                   background: #11141b; color: #aeb6c4; border-radius: 0 6px 6px 0; }
  .md table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin: 0.85rem 0; }
  .md th, .md td { border: 1px solid #2a303b; padding: 6px 9px; text-align: left; vertical-align: top; }
  .md th { background: #161a22; color: #e8ebf1; white-space: nowrap; }
  .md tr:nth-child(even) td { background: #0e1116; }
</style>
{% endblock %}
